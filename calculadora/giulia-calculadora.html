<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Financeira Hygra</title>
</head>
<body>
     <p>Qual é o valor médio total(R$) do estoque armazenado no local?</p>
     <input type="text" id="ipt_valorMedioEstoque"> <br>

     <p>Aproximadamente quantas peças ficam armazenadas no estoque?</p>
     <input type="text" id="ipt_pecasPorEstoque"> <br>

     <p>Quando ocorre um problema de umidade/mofo/avaria, aproximadamente quantas peças são afetadas?</p>
     <input type="text" id="ipt_pecasAfetadas"> <br>

     <p>Quantas vezes por ano ocorrem perdas relacionadas à umidade ou mofo?</p>
     <input type="text" id="ipt_renovacaoAnual"> <br>

     <button onclick="calculoImpacto()">Avaliar Impacto</button> <br>

     <div id="div_exibirImpacto"> </div>

</body>
<script>

function calculoImpacto() {

    //Inputs em variaveis como numeros
  let valorEstoque = Number(ipt_valorMedioEstoque.value);
  let pecasTotais = Number(ipt_pecasPorEstoque.value);
  let  pecasPerdidas = Number(ipt_pecasAfetadas.value);
  let renovacaoAnual = Number(ipt_renovacaoAnual.value);

  // Quantidade de perda por problema
 let EstoquePerdido = pecasPerdidas / pecasTotais;
 let perdaEmDinheiro = EstoquePerdido * valorEstoque;
 let prejuizoAnual = perdaEmDinheiro * renovacaoAnual;

 //Percentual de estoque perdido em porcentagem
 let percentualPerda = EstoquePerdido * 100;

 //Simulação de redução de perda com monitoramento rduzido a 0.5%
 let prejuizoComSensor = perdaEmDinheiro * 0.005;
 let economia = prejuizoAnual - (prejuizoComSensor);



  div_exibirImpacto.innerHTML = `
  <h3>Diagnóstico do Impacto no Estoque</h3>

  Seu estoque pode perder aproximadamente <b>${percentualPerda.toFixed(0)}%</b> de peças
  quando ocorre um problema de umidade ou mofo.<br><br>

  Prejuízo médio por evento: <b>R$ ${perdaEmDinheiro.toFixed(2)}</b><br>

  Prejuízo anual estimado: <b>R$ ${prejuizoAnual.toFixed(2)}</b><br><br>

  <h3>Com monitoramento Hygra</h3>

  Ao identificar níveis críticos de umidade antes da deterioração do tecido,
  é possível reduzir significativamente essas perdas.<br><br>

  Prejuízo estimado com monitoramento: <b>R$ ${prejuizoComSensor.toFixed(2)}</b><br>

  Economia potencial anual: <b>R$ ${economia.toFixed(2)}</b>
  `;
}

</script>
</html>
